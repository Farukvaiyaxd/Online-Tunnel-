name: Build & Release APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: OnlineTunnel-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Delete old release if exists
        run: |
          gh release delete latest-build --yes 2>/dev/null || true
          git push origin :refs/tags/latest-build 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-build
          name: "Online Tunnel — Latest Build"
          body: |
            **Auto-build from latest commit**

            ### Install
            1. Download `OnlineTunnel-debug.apk` below
            2. Enable "Unknown sources" on your phone
            3. Install the APK

            ### Features
            - VLESS / VMess / Trojan URL import
            - Server online check (TCP ping)
            - VPN tunnel with IP/TCP packet forwarding
            - Disconnect & Cancel buttons in notification
          files: app/build/outputs/apk/debug/app-debug.apk
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
